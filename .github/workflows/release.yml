name: Release Tagging
on:
  push:
    branches:
      - main
    # Skip releases for non-shipping changes (docs, config, IDE, generated PDFs).
    # A push touching only these paths won't tag; any code/SQL/template change still does.
    paths-ignore:
      - '.gitignore'
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '*.code-workspace'
      - '**/*.pdf'
      - 'LICENSE'
permissions:
  contents: write
jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v$(date +'%Y.%m.%d').${{ github.run_number }}"
          git tag -a "$TAG" -m "Automated release $TAG"
          git push origin "$TAG"
